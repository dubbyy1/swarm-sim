name: Build Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --windowed --name swarm-sim main.py

      - name: Package Linux build
        if: matrix.name == 'linux'
        run: |
          cd dist
          zip -r swarm-sim-linux.zip swarm-sim

      - name: Package Windows build
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/swarm-sim -DestinationPath dist/swarm-sim-windows.zip

      - name: Package macOS build
        if: matrix.name == 'macos'
        run: |
          cd dist
          if [ -d "swarm-sim.app" ]; then
            zip -r swarm-sim-macos.zip swarm-sim.app
          else
            zip -r swarm-sim-macos.zip swarm-sim
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: swarm-sim-${{ matrix.name }}
          path: dist/swarm-sim-${{ matrix.name }}.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          files=$(find artifacts -name '*.zip' -type f)

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" $files --clobber
          else
            gh release create "$TAG_NAME" $files --title "$TAG_NAME" --notes "Automated release build for $TAG_NAME."
          fi
